<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - It Pink Club</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="js/admin.js"></script>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <main id="login" class="container-login">
        <form id="form-login" class="card-login">
            <h1>It Pink Club</h1>
            <p>Acesse o painel administrativo</p>
            
            <div id="erro-login" class="mensagem"></div>

            <label for="email">E-mail</label>
            <input type="email" id="email" required placeholder="seu@email.com">

            <label for="senha">Senha</label>
            <input type="password" id="senha" required placeholder="••••••••">

            <button type="submit" class="btn-primary">Entrar</button>
        </form>
    </main>

    <!-- PAINEL ADMINISTRATIVO -->
    <div id="painel" hidden>
        <header class="admin-header">
            <div class="header-container">
                <h2>Painel Administrativo</h2>
                <button id="sair" class="btn-secondary">Sair</button>
            </div>
        </header>

        <main class="admin-container">
            <!-- FORMULÁRIO DE PRODUTO -->
            <section class="card-form">
                <h3 id="form-titulo">Novo produto</h3>
                <form id="form-produto">
                    <input type="hidden" id="id-produto">

                    <label for="nome">Nome do Produto</label>
                    <input type="text" id="nome" required placeholder="Ex: Lip Oil Hidratante">

                    <label for="categoria">Categoria
                        <select id="categoria" required>
                            <option value="" disabled selected>Selecione uma categoria...</option>
                            <option value="skincare">Skincare</option>
                            <option value="cabelo">Cabelos</option>
                            <option value="moda">Moda</option>
                            <option value="infantil">Infantil</option>
                            <option value="fitness">Fitness</option>
                            <option value="outros">Outros</option>
                        </select>
                    </label>

                    <label for="preco">Preço (R$)</label>
                    <input type="number" id="preco" step="0.01" min="0" placeholder="0.00">

                    <label for="link">Link de Afiliado / Compra</label>
                    <input type="url" id="link" required placeholder="https://shopee.com.br/...">

                    <label for="imagem">Imagem do Produto</label>
                    <input type="file" id="imagem" accept="image/*">
                    <small id="imagem-atual"></small>

                    <div class="preview-box">
                        <img id="preview-imagem" src="https://placehold.co/500x500/fff0f7/ff3f9b?text=Preview" alt="Preview">
                    </div>

                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox" id="destaque"> Destaque na Home
                        </label>
                        <label>
                            <input type="checkbox" id="ativo" checked> Ativo (Visível no site)
                        </label>
                    </div>

                    <div id="mensagem-form" class="mensagem"></div>

                    <div class="form-acoes">
                        <button type="submit" id="salvar" class="btn-primary">Salvar Produto</button>
                        <button type="button" id="cancelar" class="btn-secondary" hidden>Cancelar</button>
                    </div>
                </form>
            </section>

            <!-- LISTA DE PRODUTOS -->
            <section class="card-lista">
                <h3>Produtos Cadastrados</h3>
                <div id="lista" class="lista-produtos">
                    <!-- Produtos inseridos dinamicamente pelo JS -->
                </div>
            </section>
        </main>
    </div>

</body>
</html>
