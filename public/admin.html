<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="theme-color" content="#ff3f9b"><title>Painel | It Pink Club</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/admin.css"></head><body><main class="admin-shell"><section id="login" class="auth-card"><h1>💖 It Pink Club</h1><p>Entre para gerenciar a vitrine.</p><form id="form-login"><label>E-mail<input id="email" type="email" required autocomplete="email"></label><label>Senha<input id="senha" type="password" required autocomplete="current-password"></label><button>Entrar</button></form><p id="erro-login" class="mensagem" role="alert"></p></section><section id="painel" hidden><header class="admin-topo"><div><p class="eyebrow">Painel administrativo</p><h1>💖 It Pink Club</h1></div><button id="sair" class="secundario" type="button">Sair</button></header><div class="admin-grid"><section class="painel-card"><h2 id="form-titulo">Novo produto</h2><form id="form-produto"><input id="id-produto" type="hidden"><label>Nome do produto<input id="nome" required maxlength="100"></label><label>Categoria<select id="categoria" required><option value="infantil">Moda Infantil</option><option value="ballet">Ballet</option><option value="mochilas">Mochilas</option><option value="bolsas">Bolsas</option><option value="casa">Casa</option><option value="outros">Outros</option></select></label><label>Preço (opcional)<input id="preco" type="number" min="0" step="0.01" placeholder="0,00"></label><label>Link do produto<input id="link" type="url" required placeholder="https://..."></label><label>Imagem<input id="imagem" type="file" accept="image/jpeg,image/png,image/webp"></label><p id="imagem-atual" class="ajuda"></p><div class="checks"><label><input id="destaque" type="checkbox"> Destaque</label><label><input id="ativo" type="checkbox" checked> Ativo</label></div><p id="mensagem-form" class="mensagem" role="status"></p><div class="acoes-form"><button id="salvar" type="submit">Salvar produto</button><button id="cancelar" class="secundario" type="button" hidden>Cancelar edição</button></div></form></section><section class="painel-card"><h2>Produtos</h2><div id="lista" class="lista-produtos" aria-live="polite"></div></section></div></section></main><script type="module" src="js/admin.js"></script></body></html>
