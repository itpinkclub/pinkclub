<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel It Pink Club</title>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">


<link rel="stylesheet" href="/css/admin.css">


</head>


<body>


<header class="topo">

    <h1>💖 Painel It Pink Club</h1>


    <button id="sair">
        Sair
    </button>


</header>





<main>



<h2>Novo Produto</h2>



<div class="formulario">



<input 
id="nome" 
placeholder="Nome do produto"
>



<input 
id="categoria" 
placeholder="Categoria"
>



<input 
id="preco" 
type="number"
placeholder="Preço"
>



<input 
id="link" 
placeholder="Link Shopee"
>



<label>
    Imagem do produto
</label>


<input 
id="imagem" 
type="file"
accept="image/*"
>





<label>


<input 
id="destaque" 
type="checkbox"
>


Destaque


</label>





<label>


<input 
id="ativo" 
type="checkbox"
checked
>


Ativo


</label>





<button id="salvar">


Salvar Produto


</button>




</div>






<h2>Produtos</h2>




<div id="lista">

</div>





</main>







<script type="module" src="/js/admin.js"></script>




</body>

</html>
